services:
  mssql-server:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
      - MSSQL_PID=Developer
    ports:
      - '1433:1433'
    volumes:
      - mssql:/var/opt/mssql

  backend-gateway:
    image: ${DOCKER_REGISTRY-}backend-gateway
    build:
      context: ./BackendGateway
      dockerfile: Dockerfile
    ports:
      - '5000:80'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80

  user-service:
    image: ${DOCKER_REGISTRY-}user-service
    build:
      context: ./UserService
      dockerfile: Dockerfile
    ports:
      - '5001:80'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80

volumes:
  mssql:
